services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mnemos-app
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - mnemos_network
    volumes:
      - .:/var/www/html
    env_file:
      - .env.docker

  db:
    image: postgres:16-alpine
    container_name: mnemos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mnemos
      POSTGRES_USER: mnemos
      POSTGRES_PASSWORD: secret
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - mnemos_network
    volumes:
      - postgres_data:/var/lib/postgresql/data

networks:
  mnemos_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
