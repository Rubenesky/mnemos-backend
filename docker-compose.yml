services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mnemos-app
    restart: unless-stopped
    depends_on:
      - db
      - redis
    networks:
      - mnemos_network
    volumes:
      - .:/var/www/html
    env_file:
      - .env.docker

  nginx:
    image: nginx:alpine
    container_name: mnemos-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - mnemos_network

  db:
    image: postgres:16-alpine
    container_name: mnemos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mnemos
      POSTGRES_USER: mnemos
      POSTGRES_PASSWORD: secret
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - mnemos_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: mnemos-redis
    restart: unless-stopped
    networks:
      - mnemos_network
    volumes:
      - redis_data:/data

  metabase:
    image: metabase/metabase:latest
    container_name: mnemos-metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - mnemos_network
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: mnemos
      MB_DB_PASS: ""
      MB_DB_HOST: db
    volumes:
      - metabase_data:/metabase-data

networks:
  mnemos_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  metabase_data:
    driver: local
