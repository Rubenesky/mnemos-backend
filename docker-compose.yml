services:
  db:
    image: postgres:16-alpine
    container_name: mnemos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mnemos
      POSTGRES_USER: mnemos
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    networks:
      - mnemos_network
    volumes:
      - postgres_data:/var/lib/postgresql/data

networks:
  mnemos_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
