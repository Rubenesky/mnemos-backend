services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mnemos-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE:-mnemos}
      - DB_USERNAME=${DB_USERNAME:-mnemos}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - CLOUDINARY_URL=${CLOUDINARY_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QUEUE_CONNECTION=database
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"]

  db:
    image: mysql:8.0
    container_name: mnemos-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mnemos}
      MYSQL_USER: ${DB_USERNAME:-mnemos}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "3306:3306"
    volumes:
      - mnemos_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      interval: 5s

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mnemos-queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE:-mnemos}
      - DB_USERNAME=${DB_USERNAME:-mnemos}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - QUEUE_CONNECTION=database
    depends_on:
      - db
    command: ["php", "artisan", "queue:work", "--tries=3"]

volumes:
  mnemos_db_data:
    driver: local
